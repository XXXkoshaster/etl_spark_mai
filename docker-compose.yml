version: "3.9"
  
services:
  postgres:
    image: postgres:13.3
    container_name: postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./init_db/:/docker-entrypoint-initdb.d
      - ./data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d star"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - spark-net

  clickhouse:
    image: clickhouse/clickhouse-server:26.1-alpine
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - .volumes/ch_data:/var/lib/clickhouse
      - .volumes/ch_logs:/var/log/clickhouse-server
      - ./docker/clickhouse/init:/docker-entrypoint-initdb.d
    ports:
      - "8123:8123"
    restart: on-failure
    networks:
      - spark-net
      
  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: local-spark:3.5.1
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
      - "4040:4040"
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_PUBLIC_DNS=localhost
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./spark-app:/opt/spark-app
      - ./spark-data:/opt/spark-data
    networks:
      - spark-net

  spark-worker:
    image: local-spark:3.5.1
    container_name: spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8081:8081"
    environment:
      - SPARK_WORKER_CORES=8
      - SPARK_WORKER_MEMORY=8G
      - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_PUBLIC_DNS=localhost
    volumes:
      - ./spark-app:/opt/spark-app
      - ./spark-data:/opt/spark-data
    networks:
      - spark-net

  jupyter:
    build: .
    image: local-pyspark-351:latest
    container_name: jupyter
    depends_on:
      - spark-master
    ports:
      - "8888:8888"
      - "4041:4040"
    environment:
      - PYSPARK_MASTER=spark://spark-master:7077
      - PYSPARK_PYTHON=python3
      - SPARK_PUBLIC_DNS=localhost
      - SPARK_UI_PORT=4040
    volumes:
      - ./notebooks:/opt/spark-notebooks
      - ./spark-data:/opt/spark-data
      - ./spark-app:/opt/spark-app
    networks:
      - spark-net

  pgadmin:
    image: dpage/pgadmin4
    networks:
      - spark-net
    environment:
      - PGADMIN_DEFAULT_EMAIL=root@root.com
      - PGADMIN_DEFAULT_PASSWORD=root
    ports:
      - "8050:80"

networks:
  spark-net:
    driver: bridge